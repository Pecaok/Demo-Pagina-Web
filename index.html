<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Delivery - Hamburguesas</title>
    <style>
        :root {
            --primary: #ff4757;
            --dark: #2f3542;
            --light: #f1f2f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            color: var(--dark);
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            display: flex;
            padding: 2rem;
            gap: 2rem;
        }
        .menu {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }
        .cart {
            flex: 1;
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            height: fit-content;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            border-bottom: 1px solid #ddd;
            padding-bottom: 0.5rem;
        }
        #checkout-btn {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        #checkout-btn:disabled {
            background-color: #a4b0be;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍔 Demo Store</h1>
        <div id="cart-counter">Carrito: 0 items</div>
    </header>

    <div class="container">
        <div class="menu" id="menu-container">
            </div>

        <div class="cart">
            <h2>Tu Pedido</h2>
            <div id="cart-items">
                <p>El carrito está vacío.</p>
            </div>
            <h3>Total: $<span id="cart-total">0</span></h3>
            <input type="text" id="nombre-cliente" placeholder="Nombre del cliente" style="width: 90%; padding: 0.5rem; margin-top: 1rem; margin-bottom: 1rem;">
            <button id="checkout-btn" disabled>Enviar Pedido de Prueba</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
